name: LangChain Integration Tests

# Runs real API integration tests against configured LangChain backends.
# Tests skip automatically when no credentials or config are available.
#
# Required GitHub Actions secrets (configure ONE backend group):
#
#   OpenAI:
#     OPENAI_API_KEY                    - OpenAI API key
#     MCP_CODER_LLM_LANGCHAIN_BACKEND  - "openai"
#     MCP_CODER_LLM_LANGCHAIN_MODEL    - e.g. "gpt-4o-mini"
#
#   Gemini:
#     GEMINI_API_KEY                    - Google Gemini API key
#     MCP_CODER_LLM_LANGCHAIN_BACKEND  - "gemini"
#     MCP_CODER_LLM_LANGCHAIN_MODEL    - e.g. "gemini-2.0-flash"
#
#   Anthropic:
#     ANTHROPIC_API_KEY                 - Anthropic API key
#     MCP_CODER_LLM_LANGCHAIN_BACKEND  - "anthropic"
#     MCP_CODER_LLM_LANGCHAIN_MODEL    - e.g. "claude-sonnet-4-5-20250929"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  langchain-integration:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      MCP_CODER_LLM_LANGCHAIN_BACKEND: ${{ secrets.MCP_CODER_LLM_LANGCHAIN_BACKEND }}
      MCP_CODER_LLM_LANGCHAIN_MODEL: ${{ secrets.MCP_CODER_LLM_LANGCHAIN_MODEL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Install dependencies
        run: uv pip install --system ".[dev,langchain]"

      - name: Run LangChain integration tests
        run: |
          pytest tests/llm/providers/langchain/test_langchain_integration.py \
            -m langchain_integration \
            -v -s \
            --junitxml=langchain-integration-tests.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: langchain-integration-results
          path: langchain-integration-tests.xml
