name: Python CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check-forbidden-folders:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v6
    
    - name: Check for forbidden folders in PR
      run: |
        echo "Checking for forbidden folders in pull request..."
        
        # Function to check for folder existence case-insensitively
        check_forbidden_folder() {
          local pattern="$1"
          local description="$2"
          
          # Use find with case-insensitive matching
          if find . -type d -ipath "*${pattern}*" -print -quit | grep -q .; then
            echo "❌ ERROR: Found forbidden folder matching '${pattern}'"
            echo "Description: ${description}"
            find . -type d -ipath "*${pattern}*" | sed 's/^/ Found: /'
            return 1
          else
            echo "✅ No forbidden folder found for pattern: ${pattern}"
            return 0
          fi
        }
        
        # Function to check if folder is empty (or doesn't exist)
        check_empty_folder() {
          local pattern="$1"
          local description="$2"
          
          # Find matching folders
          local folders=$(find . -type d -path "*${pattern}*" 2>/dev/null)
          
          if [ -z "$folders" ]; then
            echo "✅ Folder not found (acceptable): ${pattern}"
            return 0
          fi
          
          # Check if any found folder is not empty
          local has_content=0
          while IFS= read -r folder; do
            if [ -n "$(find "$folder" -mindepth 1 -print -quit)" ]; then
              echo "❌ ERROR: Folder should be empty: ${folder}"
              echo "Description: ${description}"
              find "$folder" -mindepth 1 -maxdepth 1 | sed 's/^/ Contains: /'
              has_content=1
            fi
          done <<< "$folders"
          
          if [ $has_content -eq 1 ]; then
            return 1
          else
            echo "✅ Folder exists and is empty: ${pattern}"
            return 0
          fi
        }
        
        # Check for forbidden folders
        ERROR=0
        
        check_forbidden_folder "pr_info" "Temporary development folder (planning, tracking, review logs)" || ERROR=1
        check_empty_folder "docs/tests/performance_data/prof" "Profiler output folder should be empty in PRs" || ERROR=1
        
        if [ $ERROR -eq 1 ]; then
          echo ""
          echo "❌ PULL REQUEST BLOCKED: Forbidden folders detected!"
          echo "These folders should not be included in pull requests."
          echo "Please remove them and update your .gitignore if necessary."
          echo "Note: These folders are allowed in regular commits, just not in PRs."
          exit 1
        else
          echo ""
          echo "✅ All checks passed! No forbidden folders found."
        fi

  # Matrix approach: Each check runs as independent job with individual pass/fail status
  # fail-fast: false ensures all checks complete even if one fails
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - {name: "black", cmd: "black --version && black --check src tests"}
          - {name: "isort", cmd: "isort --version && isort --check --profile=black --float-to-top src tests"}
          - {name: "pylint", cmd: "pylint --version && pylint ./src ./tests"}  # configuration via pyproject.toml
          - {name: "ruff-docstrings", cmd: "ruff version && ruff check src tests"}
          - {name: "unit-tests", cmd: "pytest --version && pytest -m 'not git_integration and not claude_cli_integration and not claude_api_integration and not copilot_cli_integration and not formatter_integration and not github_integration and not langchain_integration and not llm_integration and not textual_integration' --junitxml=unit-tests.xml"}
          - {name: "integration-tests", cmd: "pytest --version && pytest -m 'git_integration or formatter_integration or github_integration' --junitxml=integration-tests.xml"}
          - {name: "mypy", install: ".[typecheck]", cmd: "mypy --version && mypy --strict src tests"}
          - {name: "file-size", cmd: "mcp-coder check file-size --max-lines 750 --allowlist-file .large-files-allowlist"}
          - {name: "no-url-deps", cmd: "python tools/check_no_url_deps.py"}
    name: ${{ matrix.check.name }}
    steps:
      - uses: actions/checkout@v6
      
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: 3.11
          
      - name: Install dependencies
        run: |
          mapfile -t SPECS < <(python tools/read_github_deps.py --specs)
          uv pip install --system "${SPECS[@]}" "${{ matrix.check.install || '.[dev,langchain]' }}"
      
      - name: Environment info
        run: |
          uname -a
          python --version
          uv --version
          git --version
          
      - name: Run ${{ matrix.check.name }}
        run: ${{ matrix.check.cmd }}

  # Exercises the install sequence emitted by the POSIX vscodeclaude template
  # (src/mcp_coder/workflows/vscodeclaude/templates.py:VENV_SECTION_POSIX +
  # workspace.py:_build_github_install_section_posix). Calls the shared renderer
  # directly so a break in the user-facing template surfaces here. Independent
  # of `test` because it uses an activated project venv (not --system) and pulls
  # siblings at HEAD via [tool.mcp-coder.install-from-github] — see #969.
  vscodeclaude-template-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Run vscodeclaude template install sequence
        env:
          # Full clone so setuptools_scm can read tags on sibling repos (#817)
          UV_GIT_SHALLOW: "0"
        run: |
          set -euo pipefail

          # Step 1: create project venv
          uv venv

          # Activate venv so `uv pip install` targets it (matches template)
          # shellcheck disable=SC1091
          source .venv/bin/activate

          # Step 2: install project deps (with dev extra)
          uv sync --extra dev

          # Step 3: editable install of the project
          uv pip install -e . --no-deps

          # Step 4: GitHub overrides from [tool.mcp-coder.install-from-github].
          # Renders via the same workspace.py:_build_github_install_section_posix
          # function the POSIX template uses — single source of truth.
          python <<'PY' > github_install.sh
          from pathlib import Path
          from mcp_coder.workflows.vscodeclaude.workspace import (
              _build_github_install_section_posix,
          )

          print(_build_github_install_section_posix(Path(".")))
          PY

          if [ -s github_install.sh ]; then
            echo "--- GitHub override commands ---"
            cat github_install.sh
            echo "--------------------------------"
            bash github_install.sh
          else
            echo "No [tool.mcp-coder.install-from-github] entries configured — skipping step 4."
          fi

          # Smoke check: prove the venv actually works end-to-end
          mcp-coder --version
          python -c "import mcp_coder; print('mcp_coder import OK from', mcp_coder.__file__)"

  # Architecture checks - only run on pull requests
  # These validate module boundaries and import structure
  architecture:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        check:
          - {name: "import-linter", cmd: "uv pip show import-linter | grep Version && ./tools/lint_imports.sh"}
          - {name: "tach", cmd: "tach --version && ./tools/tach_check.sh"}
          - {name: "pycycle", cmd: "pycycle --version && ./tools/pycycle_check.sh"}
          - {name: "vulture", cmd: "vulture --version && ./tools/vulture_check.sh"}
    name: ${{ matrix.check.name }}
    steps:
      - uses: actions/checkout@v6
      
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: 3.11
          
      - name: Install dependencies
        run: |
          mapfile -t SPECS < <(python tools/read_github_deps.py --specs)
          uv pip install --system "${SPECS[@]}" ".[dev,langchain]"
      
      - name: Environment info
        run: |
          uname -a
          python --version
          uv --version
          git --version
          
      - name: Run ${{ matrix.check.name }}
        run: ${{ matrix.check.cmd }}
